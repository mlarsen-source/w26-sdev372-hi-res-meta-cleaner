name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server-tests:
    name: Server Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        run: npm ci

      - name: Run server unit tests
        run: npm test -- --exclude=__tests__/api.integration.test.js

  front-end-unit-tests:
    name: Front-End Unit Tests
    runs-on: ubuntu-latest
    needs: server-tests
    defaults:
      run:
        working-directory: front-end
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: front-end/package-lock.json

      - name: Install front-end dependencies
        run: npm ci

      - name: Run front-end unit tests
        run: npm test -- --exclude=__tests__/*.integration.test.tsx

  server-integration-tests:
    name: Server Integration Tests
    runs-on: ubuntu-latest
    needs: front-end-unit-tests
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_USERNAME: ${{ secrets.MYSQL_USER }}
      DB_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
      DB_DATABASE: ${{ secrets.MYSQL_DATABASE }}
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        run: npm ci

      - name: Run server integration tests
        run: npm test -- __tests__/api.integration.test.js

  front-end-integration-tests:
    name: Front-End Integration Tests
    runs-on: ubuntu-latest
    needs: server-integration-tests
    defaults:
      run:
        working-directory: front-end
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: front-end/package-lock.json

      - name: Install front-end dependencies
        run: npm ci

      - name: Run front-end integration tests
        run: npm test -- __tests__/auth-pages.integration.test.tsx __tests__/home-page.integration.test.tsx

  front-end-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: front-end-integration-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: front-end/package-lock.json

      - name: Run Cypress
        uses: cypress-io/github-action@v6
        with:
          working-directory: front-end
          install-command: npm ci
          start: npm run dev
          wait-on: "http://localhost:3000"
          wait-on-timeout: 120
          command: npm run cy:run

  quality-checks:
    name: Lint And TypeScript
    runs-on: ubuntu-latest
    needs: front-end-e2e
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node For Front-End
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: front-end/package-lock.json

      - name: Install Front-End Dependencies
        working-directory: front-end
        run: npm ci

      - name: Run Front-End Lint
        working-directory: front-end
        run: npm run lint

      - name: Run Front-End TypeScript
        working-directory: front-end
        run: npm run typecheck

      - name: Setup Node For Server
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install Server Dependencies
        working-directory: server
        run: npm ci

      - name: Run Server Lint
        working-directory: server
        run: npm run lint
